<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota - Controle de Frotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align -items-center mb-4">
            <h2>Veículos Cadastrados</h2>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar ao Início</a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <tr>ID</tr>
                            <tr>Modelo</tr>                            
                            <tr>Placa</tr>
                            <tr>Status</tr>
                            <tr>Ações</tr>                            
                        </tr>
                    </thead>
                    <tbody>
                        {% for veiculo in veiculos%}
                        <tr>
                            <td>{{veiculo.id}}</td>
                            <td>{{ veiculo.modelo }}</td>
                            <td>{{ veiculo.placa}}</td>
                            <td>
                                <span class="badge {{ 'bg-success' if veiculo.status == 'Disponível' else 'bg-warning'}}"> 
                                    {{veiculo.status}}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-info">Detalhes</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </div>
    
</body>
</html>
