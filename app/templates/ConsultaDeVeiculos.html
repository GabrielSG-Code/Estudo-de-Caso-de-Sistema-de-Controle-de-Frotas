<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota - Controle de Frotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align -items-center mb-4">
            <h2>Veículos Cadastrados</h2>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar ao Início</a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Modelo</th>                            
                            <th>Placa</th>
                            <th>Status</th>
                            <th>Ações</th>                            
                        </tr>
                    </thead>
                    <tbody>
                        {% for veiculo in veiculos%}
                        <tr>
                            <td>{{veiculo.id}}</td>
                            <td>{{ veiculo.modelo }}</td>
                            <td>{{ veiculo.placa}}</td>
                            <td>
                                <span class="badge {{ 'bg-success' if veiculo.status.value == 'Ativo' else 'bg-warning'}}"> 
                                    {{veiculo.status.value}}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-info btn-detalhes"
                                        data-bs-toggle = 'modal'
                                        data-bs-target = '#modalDetalhes'
                                        data-placa = '{{veiculo.placa}}'>Detalhes</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
        
<!--Modal-->
    <div class="modal fade" id = "modalDetalhes" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-write">
                    <h5 class="modal-title">Detalhes do Veículo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss = 'modal' aria-label="Close"></button>
                </div>
                <div class="modal-body" id="conteudoModal">
                    <div class="text-center">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p>Carregando dados da frota...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<!--Script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
